<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <rect width="600" height="200" fill="#0B0B0C"/>

  <!-- A-v3 · BURST — pulso radial (12 raios emanando da ponta) -->
  <g transform="translate(110,100)">
    <!-- 12 rays from tip (30,-50), skipping the baton direction (toward -50,35). -->
    <!-- Baton angle ≈ 227°. Rays at 12 evenly-spaced angles except ~225°. -->
    <g transform="translate(30,-50)" stroke="#C9A961" stroke-linecap="round" fill="none">
      <!-- r = 16 inner, 22 outer. Length varies slightly for rhythm. -->
      <line x1="10"     y1="0"     x2="22"     y2="0"      stroke-width="2.4" opacity="1.00"/>   <!-- 0° -->
      <line x1="8.66"   y1="-5"    x2="19.05"  y2="-11"    stroke-width="2.2" opacity="0.90"/>   <!-- 30° -->
      <line x1="5"      y1="-8.66" x2="11"     y2="-19.05" stroke-width="2.1" opacity="0.80"/>   <!-- 60° -->
      <line x1="0"      y1="-10"   x2="0"      y2="-22"    stroke-width="2.0" opacity="0.75"/>   <!-- 90° (up) -->
      <line x1="-5"     y1="-8.66" x2="-11"    y2="-19.05" stroke-width="2.0" opacity="0.70"/>   <!-- 120° -->
      <line x1="-8.66"  y1="-5"    x2="-19.05" y2="-11"    stroke-width="1.9" opacity="0.60"/>   <!-- 150° -->
      <line x1="-10"    y1="0"     x2="-22"    y2="0"      stroke-width="1.9" opacity="0.55"/>   <!-- 180° -->
      <line x1="-8.66"  y1="5"     x2="-19.05" y2="11"     stroke-width="1.8" opacity="0.50"/>   <!-- 210° -->
      <line x1="-5"     y1="8.66"  x2="-11"    y2="19.05"  stroke-width="1.8" opacity="0.50"/>   <!-- 240° - skipping exact 225° (baton direction) -->
      <line x1="0"      y1="10"    x2="0"      y2="22"     stroke-width="1.9" opacity="0.60"/>   <!-- 270° (down) -->
      <line x1="5"      y1="8.66"  x2="11"     y2="19.05"  stroke-width="2.0" opacity="0.70"/>   <!-- 300° -->
      <line x1="8.66"   y1="5"     x2="19.05"  y2="11"     stroke-width="2.2" opacity="0.85"/>   <!-- 330° -->
    </g>

    <line x1="-50" y1="35" x2="30" y2="-50" stroke="#F5F3EF" stroke-width="9" stroke-linecap="round"/>
    <line x1="-44" y1="28" x2="-28" y2="11" stroke="#C9A961" stroke-width="10" stroke-linecap="round"/>
    <circle cx="-50" cy="35" r="11" fill="#F5F3EF"/>
    <circle cx="-50" cy="35" r="5"  fill="#C9A961"/>
    <circle cx="30" cy="-50" r="7" fill="#C9A961"/>
    <circle cx="30" cy="-50" r="3" fill="#F5F3EF"/>
  </g>

  <text x="230" y="116" font-family="-apple-system, 'Inter', sans-serif"
        font-weight="600" font-size="46" letter-spacing="8" fill="#F5F3EF">ORKESTRA</text>
  <text x="230" y="140" font-family="-apple-system, 'Inter', sans-serif"
        font-weight="400" font-size="11" letter-spacing="6" fill="#C9A961">ORCHESTRATED OPERATIONS</text>
</svg>
