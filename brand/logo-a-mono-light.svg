<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <!-- MONO LIGHT: single off-white on dark / colored substrate.
       Use for: vinyl cut on dark surfaces, dark t-shirts,
       transparencies, silk-screen 1-color print on dark bg.
       No gradients, no opacity, minimum stroke 3px. -->
  <g transform="translate(110,100)" fill="none" stroke="#F5F3EF" stroke-linecap="round">
    <path d="M 16 -50 A 14 14 0 1 1 30 -36" stroke-width="3.5"/>
    <path d="M  6 -50 A 24 24 0 1 1 30 -26" stroke-width="3"/>
    <path d="M -6 -50 A 36 36 0 1 1 30 -14" stroke-width="2.8"/>
    <line x1="-50" y1="35" x2="30" y2="-50" stroke-width="10"/>
  </g>
  <g transform="translate(110,100)" fill="#F5F3EF">
    <circle cx="-50" cy="35" r="12"/>
    <circle cx="30" cy="-50" r="7"/>
  </g>
  <text x="230" y="116" font-family="-apple-system, 'Inter', 'Helvetica Neue', sans-serif"
        font-weight="600" font-size="46" letter-spacing="8" fill="#F5F3EF">ORKESTRA</text>
  <text x="230" y="140" font-family="-apple-system, 'Inter', sans-serif"
        font-weight="400" font-size="11" letter-spacing="6" fill="#F5F3EF">ORCHESTRATED OPERATIONS</text>
</svg>
