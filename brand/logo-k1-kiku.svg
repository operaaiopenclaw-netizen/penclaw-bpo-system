<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" width="640" height="220">
  <rect width="640" height="220" fill="#0B0B0C"/>

  <!-- K1 · KIKU — Batuta + roseta kikumon (12 pétalas) centrada na ponta. -->
  <g transform="translate(120,110)">
    <!-- Rosette at baton tip (30,-50). 12 almond-shaped petals radiating outward. -->
    <g transform="translate(30,-50)">
      <!-- Outer glow ring (subtle) -->
      <circle r="44" fill="none" stroke="#C9A961" stroke-width="0.6" opacity="0.25"/>

      <!-- 12 petals. Each petal is a teardrop drawn at 0° (pointing up),
           then rotated by N*30°. Path: starts near center, curves out to tip, back. -->
      <g fill="#C9A961" stroke="#C9A961" stroke-width="0.6" stroke-linejoin="round">
        <path d="M 0 -8 Q 6 -22 0 -38 Q -6 -22 0 -8 Z" transform="rotate(0)"/>
        <path d="M 0 -8 Q 6 -22 0 -38 Q -6 -22 0 -8 Z" transform="rotate(30)"/>
        <path d="M 0 -8 Q 6 -22 0 -38 Q -6 -22 0 -8 Z" transform="rotate(60)"/>
        <path d="M 0 -8 Q 6 -22 0 -38 Q -6 -22 0 -8 Z" transform="rotate(90)"/>
        <path d="M 0 -8 Q 6 -22 0 -38 Q -6 -22 0 -8 Z" transform="rotate(120)"/>
        <path d="M 0 -8 Q 6 -22 0 -38 Q -6 -22 0 -8 Z" transform="rotate(150)"/>
        <path d="M 0 -8 Q 6 -22 0 -38 Q -6 -22 0 -8 Z" transform="rotate(180)"/>
        <path d="M 0 -8 Q 6 -22 0 -38 Q -6 -22 0 -8 Z" transform="rotate(210)"/>
        <path d="M 0 -8 Q 6 -22 0 -38 Q -6 -22 0 -8 Z" transform="rotate(240)"/>
        <path d="M 0 -8 Q 6 -22 0 -38 Q -6 -22 0 -8 Z" transform="rotate(270)"/>
        <path d="M 0 -8 Q 6 -22 0 -38 Q -6 -22 0 -8 Z" transform="rotate(300)"/>
        <path d="M 0 -8 Q 6 -22 0 -38 Q -6 -22 0 -8 Z" transform="rotate(330)"/>
      </g>

      <!-- Inner dark disc (creates gap between petals and center) -->
      <circle r="10" fill="#0B0B0C"/>
      <!-- Central bead — the "maestro" point -->
      <circle r="7" fill="#C9A961"/>
      <circle r="3" fill="#F5F3EF"/>
    </g>

    <!-- Baton shaft — passes diagonally through the rosette -->
    <line x1="-50" y1="35" x2="30" y2="-50" stroke="#F5F3EF" stroke-width="9" stroke-linecap="round"/>
    <!-- Grip band -->
    <line x1="-44" y1="28" x2="-28" y2="11" stroke="#C9A961" stroke-width="10" stroke-linecap="round"/>
    <!-- Pommel -->
    <circle cx="-50" cy="35" r="11" fill="#F5F3EF"/>
    <circle cx="-50" cy="35" r="5"  fill="#C9A961"/>
  </g>

  <!-- Wordmark -->
  <text x="250" y="120" font-family="-apple-system, 'Inter', sans-serif"
        font-weight="600" font-size="48" letter-spacing="8" fill="#F5F3EF">ORKESTRA</text>
  <text x="250" y="146" font-family="-apple-system, 'Inter', sans-serif"
        font-weight="400" font-size="11" letter-spacing="6" fill="#C9A961">ORCHESTRATED OPERATIONS</text>
</svg>
