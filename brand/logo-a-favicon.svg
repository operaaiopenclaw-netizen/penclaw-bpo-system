<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Favicon: extreme simplification for 16×16 readability.
       Strips all arcs (not legible < 24px) and keeps only the
       batuta silhouette + a single gold pulse at the tip. -->
  <rect width="64" height="64" rx="10" fill="#0B0B0C"/>
  <g transform="translate(32,32)">
    <!-- Shaft: bold diagonal -->
    <line x1="-18" y1="14" x2="14" y2="-18" stroke="#F5F3EF" stroke-width="5" stroke-linecap="round"/>
    <!-- Gold grip band -->
    <line x1="-15" y1="11" x2="-8" y2="4" stroke="#C9A961" stroke-width="6" stroke-linecap="round"/>
    <!-- Pommel -->
    <circle cx="-18" cy="14" r="5" fill="#F5F3EF"/>
    <!-- Gold tip pulse -->
    <circle cx="14" cy="-18" r="4.5" fill="#C9A961"/>
  </g>
</svg>
