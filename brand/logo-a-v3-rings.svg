<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <rect width="600" height="200" fill="#0B0B0C"/>

  <!-- A-v3 · RINGS — pulso simétrico (anéis completos) -->
  <g transform="translate(110,100)">
    <!-- Full concentric rings around tip. Thin strokes avoid overwhelming the baton. -->
    <g fill="none" stroke="#C9A961" stroke-linecap="round">
      <circle cx="30" cy="-50" r="16" stroke-width="2.6" opacity="1.00"/>
      <circle cx="30" cy="-50" r="28" stroke-width="2.0" opacity="0.55"/>
      <circle cx="30" cy="-50" r="42" stroke-width="1.6" opacity="0.28"/>
    </g>

    <!-- Baton shaft -->
    <line x1="-50" y1="35" x2="30" y2="-50" stroke="#F5F3EF" stroke-width="9" stroke-linecap="round"/>
    <!-- Grip band -->
    <line x1="-44" y1="28" x2="-28" y2="11" stroke="#C9A961" stroke-width="10" stroke-linecap="round"/>
    <!-- Pommel -->
    <circle cx="-50" cy="35" r="11" fill="#F5F3EF"/>
    <circle cx="-50" cy="35" r="5"  fill="#C9A961"/>
    <!-- Tip -->
    <circle cx="30" cy="-50" r="7" fill="#C9A961"/>
    <circle cx="30" cy="-50" r="3" fill="#F5F3EF"/>
  </g>

  <text x="230" y="116" font-family="-apple-system, 'Inter', sans-serif"
        font-weight="600" font-size="46" letter-spacing="8" fill="#F5F3EF">ORKESTRA</text>
  <text x="230" y="140" font-family="-apple-system, 'Inter', sans-serif"
        font-weight="400" font-size="11" letter-spacing="6" fill="#C9A961">ORCHESTRATED OPERATIONS</text>
</svg>
