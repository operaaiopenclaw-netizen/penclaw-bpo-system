<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 340" width="360" height="340">
  <!-- ORKESTRA · Lockup Vertical/Centralizado.
       Símbolo em cima, wordmark embaixo centralizada.
       Uso: decks, papelaria vertical, posters, capas. -->
  <rect width="360" height="340" fill="#0B0B0C"/>

  <defs>
    <g id="petal-s">
      <path d="M -3 -20 C -10 -28 -13 -44 0 -54 C 13 -44 10 -28 3 -20 C 2 -18 -2 -18 -3 -20 Z" fill="#F5F3EF"/>
      <line x1="0" y1="-22" x2="0" y2="-52" stroke="#0B0B0C" stroke-width="1" stroke-linecap="round" opacity="0.85"/>
    </g>
  </defs>

  <g transform="translate(180,140) scale(1.4)">
    <use href="#petal-s" transform="rotate(0)"/>
    <use href="#petal-s" transform="rotate(22.5)"/>
    <use href="#petal-s" transform="rotate(45)"/>
    <use href="#petal-s" transform="rotate(67.5)"/>
    <use href="#petal-s" transform="rotate(90)"/>
    <use href="#petal-s" transform="rotate(112.5)"/>
    <use href="#petal-s" transform="rotate(135)"/>
    <use href="#petal-s" transform="rotate(157.5)"/>
    <use href="#petal-s" transform="rotate(180)"/>
    <use href="#petal-s" transform="rotate(202.5)"/>
    <use href="#petal-s" transform="rotate(225)"/>
    <use href="#petal-s" transform="rotate(247.5)"/>
    <use href="#petal-s" transform="rotate(270)"/>
    <use href="#petal-s" transform="rotate(292.5)"/>
    <use href="#petal-s" transform="rotate(315)"/>
    <use href="#petal-s" transform="rotate(337.5)"/>
    <circle r="22" fill="#F5F3EF"/>
    <circle r="18" fill="#0B0B0C"/>
    <circle r="13" fill="#F5F3EF"/>
    <circle r="5"  fill="#0B0B0C"/>
  </g>

  <text x="180" y="280" text-anchor="middle"
        font-family="-apple-system, 'Inter', 'Helvetica Neue', sans-serif"
        font-weight="600" font-size="38" letter-spacing="8"
        fill="#F5F3EF">ORKESTRA</text>

  <text x="180" y="304" text-anchor="middle"
        font-family="-apple-system, 'Inter', sans-serif"
        font-weight="400" font-size="10" letter-spacing="5"
        fill="#C9A961">ORCHESTRATED OPERATIONS</text>
</svg>
