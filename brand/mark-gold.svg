      <line x1="0" y1="-22" x2="0" y2="-52" stroke="#0B0B0C" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    </g>
  </defs>

  <use href="#petal-g" transform="rotate(0)"/>
