# ============================================================
# ORKESTRA.AI — DEV ENVIRONMENT
# Apenas Postgres + Redis. Backend TypeScript roda com npm run dev.
# Usage: docker-compose -f docker-compose.dev.yml up -d
# ============================================================

services:
  db:
    image: postgres:15-alpine
    container_name: orkestra-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orkestra
    ports:
      - "5433:5432"
    volumes:
      - orkestra-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orkestra"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: orkestra-redis
    ports:
      - "6379:6379"
    volumes:
      - orkestra-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  orkestra-postgres:
  orkestra-redis:
