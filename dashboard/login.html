<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>Orkestra · Login</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background:
      radial-gradient(1000px 700px at 20% 15%, rgba(201,169,97,0.08), transparent 60%),
      radial-gradient(900px 600px at 80% 85%, rgba(0,179,138,0.05), transparent 60%),
      #0B0B0C;
    color: #F5F3EF; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: rgba(20,20,22,0.92); border: 1px solid #26262A;
    padding: 40px 32px; border-radius: 16px;
    width: 380px; box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 1px rgba(201,169,97,0.3);
    backdrop-filter: blur(12px);
    position: relative;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 24px; right: 24px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,169,97,0.6), transparent);
  }
  .mark-wrap {
    display: flex; justify-content: center;
    margin-bottom: 20px;
  }
  .mark-wrap svg {
    width: 58px; height: 58px; color: #F5F3EF;
    filter: drop-shadow(0 8px 20px rgba(201,169,97,0.15));
  }
  h1 {
    margin: 0 0 6px; font-size: 22px; font-weight: 600;
    letter-spacing: 8px; text-transform: uppercase; text-align: center;
    color: #F5F3EF;
  }
  .sub {
    color: #C9A961; font-size: 10px; margin-bottom: 32px;
    letter-spacing: 5px; text-transform: uppercase; text-align: center;
  }
  label {
    display: block; font-size: 11px; color: #A8A8AF;
    margin: 16px 0 6px; letter-spacing: 0.8px; text-transform: uppercase;
  }
  input {
    width: 100%; padding: 12px 14px; border-radius: 8px;
    border: 1px solid #26262A; background: #0B0B0C;
    color: #F5F3EF; font-size: 14px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus {
    border-color: #C9A961;
    box-shadow: 0 0 0 3px rgba(201,169,97,0.12);
  }
  button {
    width: 100%; margin-top: 28px; padding: 13px;
    border: none; border-radius: 8px; cursor: pointer;
    background: linear-gradient(180deg, #D4B674 0%, #C9A961 100%);
    color: #0B0B0C; font-weight: 700; font-size: 13px;
    letter-spacing: 1.5px; text-transform: uppercase;
    transition: transform 0.1s, box-shadow 0.2s;
  }
  button:hover { box-shadow: 0 8px 24px rgba(201,169,97,0.25); }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: 0.5; cursor: wait; }
  .err { color: #E0474C; font-size: 12px; margin-top: 12px; min-height: 16px; }
  .hint {
    font-size: 10px; color: #6B6B73; margin-top: 24px;
    text-align: center; letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <form class="card" id="form">
    <div class="mark-wrap" aria-hidden="true">
      <svg viewBox="-70 -70 140 140">
        <g fill="currentColor">
          <path d="M -3 -20 C -10 -28 -13 -44 0 -54 C 13 -44 10 -28 3 -20 C 2 -18 -2 -18 -3 -20 Z" transform="rotate(0)"/>
          <path d="M -3 -20 C -10 -28 -13 -44 0 -54 C 13 -44 10 -28 3 -20 C 2 -18 -2 -18 -3 -20 Z" transform="rotate(22.5)"/>
          <path d="M -3 -20 C -10 -28 -13 -44 0 -54 C 13 -44 10 -28 3 -20 C 2 -18 -2 -18 -3 -20 Z" transform="rotate(45)"/>
          <path d="M -3 -20 C -10 -28 -13 -44 0 -54 C 13 -44 10 -28 3 -20 C 2 -18 -2 -18 -3 -20 Z" transform="rotate(67.5)"/>
          <path d="M -3 -20 C -10 -28 -13 -44 0 -54 C 13 -44 10 -28 3 -20 C 2 -18 -2 -18 -3 -20 Z" transform="rotate(90)"/>
          <path d="M -3 -20 C -10 -28 -13 -44 0 -54 C 13 -44 10 -28 3 -20 C 2 -18 -2 -18 -3 -20 Z" transform="rotate(112.5)"/>
          <path d="M -3 -20 C -10 -28 -13 -44 0 -54 C 13 -44 10 -28 3 -20 C 2 -18 -2 -18 -3 -20 Z" transform="rotate(135)"/>
          <path d="M -3 -20 C -10 -28 -13 -44 0 -54 C 13 -44 10 -28 3 -20 C 2 -18 -2 -18 -3 -20 Z" transform="rotate(157.5)"/>
          <path d="M -3 -20 C -10 -28 -13 -44 0 -54 C 13 -44 10 -28 3 -20 C 2 -18 -2 -18 -3 -20 Z" transform="rotate(180)"/>
          <path d="M -3 -20 C -10 -28 -13 -44 0 -54 C 13 -44 10 -28 3 -20 C 2 -18 -2 -18 -3 -20 Z" transform="rotate(202.5)"/>
          <path d="M -3 -20 C -10 -28 -13 -44 0 -54 C 13 -44 10 -28 3 -20 C 2 -18 -2 -18 -3 -20 Z" transform="rotate(225)"/>
          <path d="M -3 -20 C -10 -28 -13 -44 0 -54 C 13 -44 10 -28 3 -20 C 2 -18 -2 -18 -3 -20 Z" transform="rotate(247.5)"/>
          <path d="M -3 -20 C -10 -28 -13 -44 0 -54 C 13 -44 10 -28 3 -20 C 2 -18 -2 -18 -3 -20 Z" transform="rotate(270)"/>
          <path d="M -3 -20 C -10 -28 -13 -44 0 -54 C 13 -44 10 -28 3 -20 C 2 -18 -2 -18 -3 -20 Z" transform="rotate(292.5)"/>
          <path d="M -3 -20 C -10 -28 -13 -44 0 -54 C 13 -44 10 -28 3 -20 C 2 -18 -2 -18 -3 -20 Z" transform="rotate(315)"/>
          <path d="M -3 -20 C -10 -28 -13 -44 0 -54 C 13 -44 10 -28 3 -20 C 2 -18 -2 -18 -3 -20 Z" transform="rotate(337.5)"/>
          <circle r="20"/>
        </g>
        <circle r="14" fill="#141416"/>
        <circle r="8" fill="currentColor"/>
      </svg>
    </div>
    <h1>Orkestra</h1>
    <div class="sub">Orchestrated Operations</div>
    <label>Email</label>
    <input id="email" type="email" autocomplete="username" required>
    <label>Senha</label>
    <input id="password" type="password" autocomplete="current-password" required>
    <button id="btn" type="submit">Entrar</button>
    <div class="err" id="err"></div>
    <div class="hint">Usuários seed: admin / manager / finance / operator / kitchen @orkestra.local</div>
  </form>

<script>
const form = document.getElementById('form');
const btn = document.getElementById('btn');
const errEl = document.getElementById('err');

const API = window.location.origin;

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errEl.textContent = '';
  btn.disabled = true; btn.textContent = 'Entrando…';
  try {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.error?.message || body.error || 'Falha no login');
    }
    const { user, token } = await res.json();
    localStorage.setItem('orkestra.token', token);
    localStorage.setItem('orkestra.user', JSON.stringify(user));
    const destByRole = {
      admin:    'users.html',
      manager:  'crm.html',
      finance:  'index.html',
      kitchen:  'kitchen.html',
      operator: 'operations.html',
    };
    window.location.href = destByRole[user.role] || 'operations.html';
  } catch (err) {
    errEl.textContent = err.message || String(err);
    btn.disabled = false; btn.textContent = 'Entrar';
  }
});
</script>
</body>
</html>
