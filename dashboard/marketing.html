<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>Orkestra · Marketing</title>
<link rel="stylesheet" href="app.css">
<style>
  .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 22px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; border-top: 3px solid var(--gold); }
  .kpi .label { font-size: 10px; color: var(--text-2); letter-spacing: 1.5px; text-transform: uppercase; }
  .kpi .value { font-size: 22px; font-weight: 600; margin-top: 4px; font-variant-numeric: tabular-nums; }
  @media (max-width: 1000px) { .kpi-grid { grid-template-columns: repeat(3, 1fr); } }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .channel { font-size: 10px; padding: 2px 8px; border-radius: 4px; letter-spacing: 1px; text-transform: uppercase; }
  .channel.meta    { background: rgba(24,119,242,0.15); color: #4A9EFF; }
  .channel.google  { background: rgba(234,67,53,0.15); color: #EA5A4A; }
  .channel.tiktok  { background: rgba(254,44,85,0.15); color: #FE5F85; }
  .channel.organic { background: rgba(0,179,138,0.15); color: var(--emerald); }
  .lp-status { font-size: 10px; padding: 2px 8px; border-radius: 4px; letter-spacing: 1px; text-transform: uppercase; }
  .lp-status.draft     { background: var(--bg); color: var(--text-2); border: 1px solid var(--border); }
  .lp-status.published { background: rgba(0,179,138,0.12); color: var(--emerald); border: 1px solid var(--emerald); }
  .lp-status.archived  { background: rgba(168,168,175,0.08); color: var(--text-2); border: 1px solid var(--border); }
  .lp-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .lp-form-grid .full { grid-column: 1 / -1; }
  .lp-form-grid textarea { min-height: 70px; font-family: inherit; }
  .lp-url { font-family: ui-monospace, monospace; font-size: 11px; color: var(--gold); }
</style>
</head>
<body>
<script src="app.js"></script>

<main>
  <div class="page-header">
    <h1>Marketing</h1>
    <span class="muted" id="summary">…</span>
  </div>

  <div class="kpi-grid">
    <div class="kpi"><div class="label">Investimento</div><div class="value" id="kSpend">—</div></div>
    <div class="kpi"><div class="label">Receita atribuída</div><div class="value" id="kRevenue">—</div></div>
    <div class="kpi"><div class="label">ROAS</div><div class="value" id="kRoas">—</div></div>
    <div class="kpi"><div class="label">CPA</div><div class="value" id="kCpa">—</div></div>
    <div class="kpi"><div class="label">Campanhas</div><div class="value" id="kCount">—</div></div>
  </div>

  <section class="panel">
    <h2>Nova campanha</h2>
    <form id="form" class="form-row">
      <div><label>Nome*</label><input name="name" required></div>
      <div><label>Canal*</label>
        <select name="channel" required>
          <option value="meta">Meta (IG/FB)</option>
          <option value="google">Google Ads</option>
          <option value="tiktok">TikTok</option>
          <option value="organic">Orgânico</option>
        </select>
      </div>
      <div><label>Budget diário (R$)*</label><input name="budgetDaily" type="number" step="0.01" min="0" required></div>
      <div><label>Criativos (vírgula)</label><input name="creatives" placeholder="banner1.png, video.mp4"></div>
      <div><label>&nbsp;</label><button class="primary" type="submit">Criar</button></div>
    </form>
  </section>

  <section class="panel">
    <h2>Landing pages <span class="muted" id="lp-count"></span></h2>
    <form id="lp-form" class="lp-form-grid">
      <div><label>Produto/serviço*</label><input name="product" required placeholder="BPO operacional para eventos"></div>
      <div><label>Público*</label><input name="audience" required placeholder="Agências de eventos premium em SP"></div>
      <div class="full"><label>Problema que resolve*</label><textarea name="problem" required placeholder="Gestão fragmentada do pedido ao fechamento fiscal"></textarea></div>
      <div class="full"><label>Oferta*</label><textarea name="offer" required placeholder="Orquestramos CRM, OS, cozinha, execução e financeiro em uma única operação"></textarea></div>
      <div><label>CTA*</label><input name="cta" required placeholder="Agendar diagnóstico"></div>
      <div><label>CTA link*</label><input name="ctaHref" required placeholder="https://wa.me/5511999999999"></div>
      <div><label>Tom</label>
        <select name="tone">
          <option value="direto">Direto</option>
          <option value="formal">Formal</option>
          <option value="acolhedor">Acolhedor</option>
          <option value="premium">Premium</option>
        </select>
      </div>
      <div><label>Slug (opcional)</label><input name="slug" placeholder="bpo-eventos"></div>
      <div class="full"><label>Destaques (um por linha)</label><textarea name="highlights" placeholder="CMV por evento em tempo real&#10;Comissões automáticas 40/60&#10;Auditoria fiscal sem esforço"></textarea></div>
      <div><label>E-mail de contato</label><input name="contactEmail" type="email"></div>
      <div><label>WhatsApp</label><input name="contactPhone" placeholder="+5511999999999"></div>
      <div class="full"><button class="primary" type="submit">Gerar landing page</button></div>
    </form>

    <table style="margin-top:18px">
      <thead><tr>
        <th>Produto</th><th>Slug</th><th>Status</th>
        <th class="num">Views</th><th>Criada</th><th></th>
      </tr></thead>
      <tbody id="lp-rows"></tbody>
    </table>
  </section>

  <section class="panel">
    <h2>Campanhas</h2>
    <table>
      <thead><tr>
        <th>Nome</th><th>Canal</th><th>Status</th>
        <th class="num">Budget/dia</th><th class="num">Gasto</th>
        <th class="num">Impr</th><th class="num">Clicks</th>
        <th class="num">Conv</th><th class="num">Receita</th>
        <th></th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </section>
</main>

<script>
renderNav('marketing.html');

async function loadSummary() {
  try {
    const r = await api('/marketing/summary');
    const d = r.data;
    document.getElementById('kSpend').textContent = fmtMoney(d.totals.spend);
    document.getElementById('kRevenue').textContent = fmtMoney(d.totals.revenue);
    document.getElementById('kRoas').textContent = d.roas ? d.roas.toFixed(2) + 'x' : '—';
    document.getElementById('kCpa').textContent = d.cpa ? fmtMoney(d.cpa) : '—';
    document.getElementById('kCount').textContent = fmtInt(d.campaigns);
    const prov = d.provider?.mode ?? 'mock';
    document.getElementById('summary').textContent = `provider: ${prov}`;
  } catch (err) {
    document.getElementById('summary').innerHTML = `<span class="err">${err.message}</span>`;
  }
}

async function loadCampaigns() {
  const tbody = document.getElementById('rows');
  tbody.innerHTML = '<tr><td colspan="10" class="empty">carregando…</td></tr>';
  try {
    const r = await api('/marketing/campaigns');
    const list = r.data || [];
    if (!list.length) { tbody.innerHTML = '<tr><td colspan="10" class="empty">sem campanhas</td></tr>'; return; }
    tbody.innerHTML = list.map(c => `
      <tr>
        <td>${c.name}</td>
        <td><span class="channel ${c.channel}">${c.channel}</span></td>
        <td><span class="badge ${c.status}">${c.status}</span></td>
        <td class="num">${fmtMoney(c.budgetDaily)}</td>
        <td class="num">${fmtMoney(c.spendToDate)}</td>
        <td class="num">${fmtInt(c.impressions)}</td>
        <td class="num">${fmtInt(c.clicks)}</td>
        <td class="num">${fmtInt(c.conversions)}</td>
        <td class="num">${fmtMoney(c.revenueAttributed)}</td>
        <td class="row-actions">
          ${c.status === 'active'
            ? `<button class="secondary" onclick="setStatus('${c.id}','paused')">pausar</button>`
            : c.status === 'paused'
              ? `<button class="secondary" onclick="setStatus('${c.id}','active')">retomar</button>`
              : ''}
          ${c.status !== 'ended' ? `<button class="danger" onclick="setStatus('${c.id}','ended')">encerrar</button>` : ''}
        </td>
      </tr>
    `).join('');
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="10" class="err">${err.message}</td></tr>`;
  }
}

async function setStatus(id, status) {
  const ok = await tryAction(
    () => api(`/marketing/campaigns/${id}`, { method: 'PATCH', body: JSON.stringify({ status }) }),
    `Campanha ${status}`,
  );
  if (ok) { loadCampaigns(); loadSummary(); }
}

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const payload = {
    name: fd.get('name'),
    channel: fd.get('channel'),
    budgetDaily: Number(fd.get('budgetDaily')),
    creatives: (fd.get('creatives') || '').split(',').map(s => s.trim()).filter(Boolean),
  };
  const ok = await tryAction(
    () => api('/marketing/campaigns', { method: 'POST', body: JSON.stringify(payload) }),
    'Campanha criada',
  );
  if (ok) { e.target.reset(); loadCampaigns(); loadSummary(); }
});

async function loadLPs() {
  const tbody = document.getElementById('lp-rows');
  tbody.innerHTML = '<tr><td colspan="6" class="empty">carregando…</td></tr>';
  try {
    const r = await api('/marketing/landing-pages');
    const list = r.data || [];
    document.getElementById('lp-count').textContent = list.length ? `· ${list.length}` : '';
    if (!list.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">nenhuma landing page ainda</td></tr>'; return; }
    tbody.innerHTML = list.map(lp => {
      const publicUrl = `${window.location.origin}/lp/${lp.slug}`;
      return `
        <tr>
          <td>${lp.brief?.product || '—'}</td>
          <td><a class="lp-url" href="${publicUrl}" target="_blank" rel="noopener">/lp/${lp.slug}</a></td>
          <td><span class="lp-status ${lp.status}">${lp.status}</span></td>
          <td class="num">${fmtInt(lp.views)}</td>
          <td>${fmtDate(lp.createdAt)}</td>
          <td class="row-actions">
            ${lp.status !== 'published'
              ? `<button class="primary" onclick="setLPStatus('${lp.id}','published')">publicar</button>`
              : `<button class="secondary" onclick="setLPStatus('${lp.id}','draft')">despublicar</button>`}
            <button class="secondary" onclick="regenLP('${lp.id}')">regerar</button>
            <button class="danger" onclick="delLP('${lp.id}')">excluir</button>
          </td>
        </tr>`;
    }).join('');
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="6" class="err">${err.message}</td></tr>`;
  }
}

async function setLPStatus(id, status) {
  const ok = await tryAction(
    () => api(`/marketing/landing-pages/${id}`, { method: 'PATCH', body: JSON.stringify({ status }) }),
    `Landing ${status}`,
  );
  if (ok) loadLPs();
}

async function regenLP(id) {
  const ok = await tryAction(
    () => api(`/marketing/landing-pages/${id}`, { method: 'PATCH', body: JSON.stringify({ regenerate: true }) }),
    'Copy regerada',
  );
  if (ok) loadLPs();
}

async function delLP(id) {
  if (!confirm('Excluir esta landing page?')) return;
  const ok = await tryAction(
    () => api(`/marketing/landing-pages/${id}`, { method: 'DELETE' }),
    'Landing excluída',
  );
  if (ok) loadLPs();
}

document.getElementById('lp-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const highlights = (fd.get('highlights') || '').split('\n').map(s => s.trim()).filter(Boolean);
  const payload = {
    slug: fd.get('slug') || undefined,
    brief: {
      product: fd.get('product'),
      audience: fd.get('audience'),
      problem: fd.get('problem'),
      offer: fd.get('offer'),
      cta: fd.get('cta'),
      ctaHref: fd.get('ctaHref'),
      tone: fd.get('tone'),
      highlights,
      contactEmail: fd.get('contactEmail') || undefined,
      contactPhone: fd.get('contactPhone') || undefined,
    },
  };
  const ok = await tryAction(
    () => api('/marketing/landing-pages', { method: 'POST', body: JSON.stringify(payload) }),
    'Landing page gerada',
  );
  if (ok) { e.target.reset(); loadLPs(); }
});

loadSummary();
loadCampaigns();
loadLPs();
</script>
</body>
</html>
