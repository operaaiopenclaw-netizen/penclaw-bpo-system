<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>Orkestra · AI Chat</title>
<link rel="stylesheet" href="app.css">
<style>
  .chat-layout {
    display: grid; grid-template-columns: 280px 1fr;
    gap: 16px; height: calc(100vh - 160px);
  }
  @media (max-width: 900px) { .chat-layout { grid-template-columns: 1fr; } }
  .sidebar, .thread {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; display: flex; flex-direction: column;
  }
  .sidebar-head, .thread-head {
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-2); display: flex; justify-content: space-between; align-items: center;
  }
  .sidebar-head button { padding: 4px 10px; font-size: 11px; }
  .sessions { overflow-y: auto; flex: 1; }
  .session {
    padding: 11px 14px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.15s;
  }
  .session:hover { background: rgba(255,255,255,0.02); }
  .session.active { background: rgba(201,169,97,0.08); border-left: 3px solid var(--gold); padding-left: 11px; }
  .session .title { font-size: 13px; font-weight: 500; color: var(--text); }
  .session .meta { font-size: 10px; color: var(--text-2); margin-top: 2px; }

  .messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
    background: var(--bg);
  }
  .msg { max-width: 78%; padding: 11px 14px; border-radius: 10px; font-size: 13px; line-height: 1.55; }
  .msg.user { background: rgba(201,169,97,0.12); border: 1px solid rgba(201,169,97,0.3); align-self: flex-end; }
  .msg.assistant { background: var(--surface); border: 1px solid var(--border); align-self: flex-start; }
  .msg .agent {
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 4px; font-weight: 600;
  }
  .compose {
    display: flex; gap: 10px; padding: 14px;
    border-top: 1px solid var(--border); background: var(--surface);
  }
  .compose textarea {
    flex: 1; padding: 10px 12px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text); resize: none; font-family: inherit; min-height: 40px;
  }
  .compose textarea:focus { border-color: var(--gold); outline: none; }
  .empty-thread {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: var(--text-2); flex-direction: column; gap: 10px;
  }
</style>
</head>
<body>
<script src="app.js"></script>

<main>
  <div class="page-header">
    <h1>AI Chat</h1>
    <span class="muted" id="summary">—</span>
  </div>

  <div class="chat-layout">
    <div class="sidebar">
      <div class="sidebar-head">
        <span>Sessões</span>
        <button class="primary" onclick="newSession()">+ nova</button>
      </div>
      <div class="sessions" id="sessions"></div>
    </div>

    <div class="thread">
      <div class="thread-head" id="threadHead">selecione uma sessão</div>
      <div class="messages" id="messages">
        <div class="empty-thread">
          <div>Nenhuma sessão selecionada</div>
          <button class="primary" onclick="newSession()">Iniciar nova conversa</button>
        </div>
      </div>
      <form class="compose" id="sendForm" style="display:none">
        <textarea id="msgInput" placeholder="Pergunte ao agente Orkestra…" rows="2" required></textarea>
        <button class="primary">Enviar</button>
      </form>
    </div>
  </div>
</main>

<script>
renderNav('ai-chat.html');

let activeSession = null;

async function loadSessions() {
  try {
    const r = await api('/ai-chat/sessions');
    const list = r.data || [];
    document.getElementById('summary').textContent = `${list.length} sessões`;
    const wrap = document.getElementById('sessions');
    if (!list.length) {
      wrap.innerHTML = '<div class="empty" style="padding:16px">nenhuma sessão</div>';
      return;
    }
    wrap.innerHTML = list.map(s => `
      <div class="session ${s.id === activeSession ? 'active' : ''}" onclick="openSession('${s.id}')">
        <div class="title">${s.title || 'sem título'}</div>
        <div class="meta">${s.messageCount} msgs · ${fmtDate(s.updatedAt)}</div>
      </div>
    `).join('');
  } catch (err) {
    document.getElementById('summary').innerHTML = `<span class="err">${err.message}</span>`;
  }
}

async function openSession(id) {
  activeSession = id;
  document.getElementById('sendForm').style.display = 'flex';
  const wrap = document.getElementById('messages');
  wrap.innerHTML = '<div class="empty-thread">carregando…</div>';
  try {
    const r = await api(`/ai-chat/sessions/${id}`);
    const s = r.data;
    document.getElementById('threadHead').textContent = s.title;
    if (!s.messages.length) {
      wrap.innerHTML = '<div class="empty-thread">envie a primeira mensagem</div>';
    } else {
      wrap.innerHTML = s.messages.map(m => `
        <div class="msg ${m.role}">
          ${m.agent ? `<div class="agent">${m.agent}</div>` : ''}
          ${m.content.replace(/\n/g, '<br>')}
        </div>
      `).join('');
      wrap.scrollTop = wrap.scrollHeight;
    }
    loadSessions();
  } catch (err) {
    wrap.innerHTML = `<div class="err" style="padding:20px">${err.message}</div>`;
  }
}

async function newSession() {
  try {
    const r = await api('/ai-chat/sessions', {
      method: 'POST',
      body: JSON.stringify({ title: 'Nova conversa' }),
    });
    await loadSessions();
    openSession(r.data.id);
  } catch (err) { toast(err.message, 'err'); }
}

document.getElementById('sendForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!activeSession) return;
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content) return;
  input.disabled = true;
  try {
    await api(`/ai-chat/sessions/${activeSession}/message`, {
      method: 'POST',
      body: JSON.stringify({ content }),
    });
    input.value = '';
    openSession(activeSession);
  } catch (err) { toast(err.message, 'err'); }
  finally { input.disabled = false; input.focus(); }
});

loadSessions();
</script>
</body>
</html>
