<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>Orkestra · Faturamento</title>
<link rel="stylesheet" href="app.css">
<style>
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; border-top: 3px solid var(--border); }
  .kpi.draft     { border-top-color: #6B6B73; }
  .kpi.issued    { border-top-color: var(--warn); }
  .kpi.paid      { border-top-color: var(--emerald); }
  .kpi.overdue   { border-top-color: var(--danger); }
  .kpi .label { font-size: 10px; color: var(--text-2); letter-spacing: 1.5px; text-transform: uppercase; }
  .kpi .value { font-size: 22px; font-weight: 600; margin-top: 6px; font-variant-numeric: tabular-nums; }
  .kpi .meta { font-size: 11px; color: var(--text-2); margin-top: 2px; }
  @media (max-width: 900px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<script src="app.js"></script>

<main>
  <div class="page-header">
    <h1>Faturamento</h1>
    <span class="muted" id="summary">…</span>
  </div>

  <div class="kpi-grid">
    <div class="kpi draft"><div class="label">Rascunho</div><div class="value" id="kDraft">—</div><div class="meta" id="mDraft"></div></div>
    <div class="kpi issued"><div class="label">Emitido</div><div class="value" id="kIssued">—</div><div class="meta" id="mIssued"></div></div>
    <div class="kpi paid"><div class="label">Pago</div><div class="value" id="kPaid">—</div><div class="meta" id="mPaid"></div></div>
    <div class="kpi overdue"><div class="label">Em atraso</div><div class="value" id="kOverdue">—</div><div class="meta" id="mOverdue"></div></div>
  </div>

  <section class="panel">
    <h2>Emitir fatura</h2>
    <form id="form" class="form-row">
      <div><label>Cliente*</label><input name="customerName" required></div>
      <div><label>CNPJ/CPF</label><input name="customerDocument"></div>
      <div><label>E-mail</label><input name="customerEmail" type="email"></div>
      <div><label>Descrição*</label><input name="description" required></div>
      <div><label>Valor (R$)*</label><input name="amount" type="number" step="0.01" min="0.01" required></div>
      <div><label>Vencimento*</label><input name="dueDate" type="date" required></div>
      <div><label>&nbsp;</label><button class="primary" type="submit">Emitir</button></div>
    </form>
  </section>

  <section class="panel">
    <h2>Faturas</h2>
    <table>
      <thead><tr>
        <th>Nº</th><th>Emitida</th><th>Vence</th>
        <th>Cliente</th><th class="num">Valor</th>
        <th>Status</th><th></th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </section>
</main>

<script>
renderNav('invoices.html');

async function loadSummary() {
  try {
    const r = await api('/invoices/summary');
    const d = r.data;
    const get = (k) => d.byStatus[k] || { count: 0, total: 0 };
    const [dr, is, pd, ov] = ['draft', 'issued', 'paid', 'overdue'].map(get);
    document.getElementById('kDraft').textContent = fmtInt(dr.count);
    document.getElementById('mDraft').textContent = fmtMoney(dr.total);
    document.getElementById('kIssued').textContent = fmtInt(is.count);
    document.getElementById('mIssued').textContent = fmtMoney(is.total);
    document.getElementById('kPaid').textContent = fmtInt(pd.count);
    document.getElementById('mPaid').textContent = fmtMoney(pd.total);
    document.getElementById('kOverdue').textContent = fmtInt(ov.count);
    document.getElementById('mOverdue').textContent = fmtMoney(ov.total);
    document.getElementById('summary').textContent = `${d.count} faturas · provider ${d.provider}`;
  } catch (err) {
    document.getElementById('summary').innerHTML = `<span class="err">${err.message}</span>`;
  }
}

async function loadList() {
  const tbody = document.getElementById('rows');
  tbody.innerHTML = '<tr><td colspan="7" class="empty">carregando…</td></tr>';
  try {
    const r = await api('/invoices/');
    const list = r.data || [];
    if (!list.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">sem faturas</td></tr>'; return; }
    tbody.innerHTML = list.map(i => `
      <tr>
        <td><span class="mono">${i.number}</span></td>
        <td>${fmtDay(i.issueDate)}</td>
        <td>${fmtDay(i.dueDate)}</td>
        <td>${i.customerName}</td>
        <td class="num">${fmtMoney(i.amount)}</td>
        <td><span class="badge ${i.status}">${i.status}</span></td>
        <td class="row-actions">
          ${i.boletoUrl ? `<a href="${i.boletoUrl}" target="_blank" class="btn-link">boleto</a>` : ''}
          ${i.nfseUrl ? `<a href="${i.nfseUrl}" target="_blank" class="btn-link">NFSe</a>` : ''}
          ${i.status === 'issued' ? `<button class="secondary" onclick="markPaid('${i.id}')">pago</button>` : ''}
        </td>
      </tr>
    `).join('');
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="7" class="err">${err.message}</td></tr>`;
  }
}

async function markPaid(id) {
  const ok = await tryAction(
    () => api(`/invoices/${id}/status`, { method: 'PATCH', body: JSON.stringify({ status: 'paid' }) }),
    'Marcada como paga',
  );
  if (ok) { loadList(); loadSummary(); }
}

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const payload = {
    customerName:     fd.get('customerName'),
    customerDocument: fd.get('customerDocument') || undefined,
    customerEmail:    fd.get('customerEmail') || undefined,
    description:      fd.get('description'),
    amount:           Number(fd.get('amount')),
    dueDate:          new Date(fd.get('dueDate')).toISOString(),
  };
  const ok = await tryAction(
    () => api('/invoices/', { method: 'POST', body: JSON.stringify(payload) }),
    'Fatura emitida',
  );
  if (ok) { e.target.reset(); loadList(); loadSummary(); }
});

loadSummary();
loadList();
</script>
</body>
</html>
