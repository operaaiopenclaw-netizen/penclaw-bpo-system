<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Orkestra · Usuários</title>
<link rel="stylesheet" href="app.css">
<style>
  .inactive { opacity: 0.45; }
  form#createForm { display: grid; grid-template-columns: repeat(5, 1fr) auto; gap: 10px; }
</style>
</head>
<body>
<script src="app.js"></script>

<main>
  <div class="panel">
    <h2>Criar usuário</h2>
    <form id="createForm">
      <input name="email" type="email" placeholder="email" required>
      <input name="name" type="text" placeholder="nome" required>
      <input name="password" type="password" placeholder="senha (≥8)" minlength="8" required>
      <select name="role" required>
        <option value="operator">operator</option>
        <option value="manager">manager</option>
        <option value="finance">finance</option>
        <option value="kitchen">kitchen</option>
        <option value="admin">admin</option>
      </select>
      <input name="tenantId" type="text" placeholder="tenantId (opcional)">
      <button class="btn" type="submit">Criar</button>
    </form>
    <div class="err" id="createErr"></div>
  </div>

  <div class="panel">
    <h2>Usuários do tenant</h2>
    <table>
      <thead>
        <tr>
          <th>Email</th><th>Nome</th><th>Role</th><th>Status</th>
          <th>Último login</th><th></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</main>

<script>
renderNav('users.html');
if (ME.role !== 'admin') { window.location.href = 'operations.html'; }
const me = ME;  // legacy alias for inline handlers below

async function refresh() {
  const tbody = document.getElementById('rows');
  tbody.innerHTML = '<tr><td colspan="6" style="color:#8b93b4">carregando…</td></tr>';
  try {
    const { users } = await api('/users/');
    tbody.innerHTML = '';
    for (const u of users) {
      const tr = document.createElement('tr');
      if (!u.isActive) tr.className = 'inactive';
      tr.innerHTML = `
        <td>${u.email}</td>
        <td>${u.name}</td>
        <td><span class="role ${u.role}">${u.role}</span></td>
        <td>${u.isActive ? 'ativo' : 'inativo'}</td>
        <td>${fmtDate(u.lastLoginAt)}</td>
        <td>
          <button class="danger" data-id="${u.id}" data-action="toggle">${u.isActive ? 'desativar' : 'ativar'}</button>
          ${u.id !== me.id ? `<button class="danger" data-id="${u.id}" data-action="delete">excluir</button>` : ''}
        </td>
      `;
      tbody.appendChild(tr);
    }
    tbody.querySelectorAll('button').forEach((btn) => {
      btn.onclick = () => handleAction(btn.dataset.id, btn.dataset.action);
    });
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="6" style="color:#ff7676">${err.message}</td></tr>`;
  }
}

async function handleAction(id, action) {
  if (action === 'delete') {
    if (!confirm('Excluir definitivamente?')) return;
    await api(`/users/${id}`, { method: 'DELETE' });
  } else if (action === 'toggle') {
    const row = [...document.querySelectorAll('#rows tr')].find((tr) =>
      tr.innerHTML.includes(id),
    );
    const currentlyActive = row && !row.className.includes('inactive');
    await api(`/users/${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ isActive: !currentlyActive }),
    });
  }
  refresh();
}

document.getElementById('createForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const payload = {
    email: fd.get('email'),
    name: fd.get('name'),
    password: fd.get('password'),
    role: fd.get('role'),
  };
  const tenantId = fd.get('tenantId');
  if (tenantId) payload.tenantId = tenantId;
  const errEl = document.getElementById('createErr');
  errEl.textContent = '';
  try {
    await api('/users/', { method: 'POST', body: JSON.stringify(payload) });
    e.target.reset();
    refresh();
  } catch (err) {
    errEl.textContent = err.message;
  }
});

refresh();
</script>
</body>
</html>
