<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>Orkestra · Comercial/Comissões</title>
<link rel="stylesheet" href="app.css">
</head>
<body>
<script src="app.js"></script>

<main>
  <div class="page-header">
    <h1>💸 Comercial · Comissões & bônus</h1>
    <span class="muted" id="summary">…</span>
  </div>

  <div class="panel">
    <h2>Dashboard comercial</h2>
    <div class="kpis" id="kpis"></div>
    <table style="margin-top:14px">
      <thead><tr><th>Top contratos por margem</th><th class="num">Valor</th><th class="num">Margem projetada</th><th>Assinado</th></tr></thead>
      <tbody id="topContracts"></tbody>
    </table>
  </div>

  <div class="panel">
    <h2>Plano de comissão por contrato</h2>
    <form id="planForm">
      <div class="form-row">
        <div><label>Contract ID*</label><input name="contractId" required></div>
        <div><label>Comissão % (0-1)*</label><input name="commissionPct" type="number" step="0.001" min="0" max="1" value="0.05" required></div>
        <div><label>Base</label><select name="baseType"><option>MARGIN</option><option>REVENUE</option></select></div>
        <div><label>% Assinatura</label><input name="signingPct" type="number" step="0.01" min="0" max="1" value="0.4"></div>
        <div><label>% Parcelas</label><input name="installmentPct" type="number" step="0.01" min="0" max="1" value="0.6"></div>
        <div><label>Carência (dias)</label><input name="carencyDays" type="number" min="0" value="0"></div>
        <div><label>Override gerente %</label><input name="managerOverridePct" type="number" step="0.01" min="0" max="1" value="0"></div>
        <div><label>Split SDR %</label><input name="sdrSplitPct" type="number" step="0.01" min="0" max="1" value="0"></div>
        <div><label>&nbsp;</label><button class="btn" type="submit">Criar plano</button></div>
      </div>
    </form>
  </div>

  <div class="panel">
    <h2>Lançar pagamento</h2>
    <form id="payForm">
      <div class="form-row">
        <div><label>Contract ID*</label><input name="contractId" required></div>
        <div><label>Installment ID</label><input name="installmentId"></div>
        <div><label>Valor (R$)*</label><input name="amount" type="number" step="0.01" min="0.01" required></div>
        <div><label>Data*</label><input name="paidAt" type="datetime-local" required></div>
        <div><label>Método*</label>
          <select name="method" required><option>PIX</option><option>BOLETO</option><option>CARD</option><option>TRANSFER</option><option>CHECK</option><option>OTHER</option></select>
        </div>
        <div><label>Ref externa</label><input name="externalRef"></div>
        <div><label>&nbsp;</label><button class="btn" type="submit">Registrar</button></div>
      </div>
    </form>
  </div>

  <div class="panel">
    <h2>Commission entries</h2>
    <div class="flex" style="margin-bottom:10px">
      <label style="margin:0">Status</label>
      <select id="entryStatus" style="width:auto">
        <option value="">(todos)</option>
        <option>FORECAST</option><option>LOCKED</option><option>RELEASED</option><option>PAID</option><option>CANCELLED</option>
      </select>
      <button class="secondary" onclick="loadEntries()">Atualizar</button>
      <button class="secondary" onclick="tick()">Tick (liberar LOCKED vencidos)</button>
    </div>
    <table>
      <thead><tr><th>Contrato</th><th>Usuário</th><th>Kind</th><th>Status</th><th class="num">Valor</th><th>Agendado</th><th>Pago</th><th></th></tr></thead>
      <tbody id="entries"></tbody>
    </table>
  </div>

  <div class="panel">
    <h2>Pagamentos recentes</h2>
    <table>
      <thead><tr><th>Data</th><th>Contrato</th><th class="num">Valor</th><th>Método</th><th>Ref</th><th>Status</th></tr></thead>
      <tbody id="payments"></tbody>
    </table>
  </div>
</main>

<script>
renderNav('commercial.html');

async function loadDashboard() {
  try {
    const d = await api('/commercial/dashboard');
    const kpis = [
      { label: 'Pipeline ativo',        value: d.pipeline.active.count, sub: fmtMoney(d.pipeline.active.totalValue) },
      { label: 'Margem projetada',      value: fmtMoney(d.pipeline.active.totalMargin) },
      { label: 'Comissão forecast',     value: d.commission.forecast.count, sub: fmtMoney(d.commission.forecast.amount) },
      { label: 'Comissão released',     value: d.commission.released.count, sub: fmtMoney(d.commission.released.amount) },
      { label: 'Comissão paga',         value: d.commission.paid.count,     sub: fmtMoney(d.commission.paid.amount) },
      { label: 'Bônus apurados (mês)',  value: d.bonus.current.length },
    ];
    document.getElementById('kpis').innerHTML = kpis.map(k => `
      <div class="kpi"><div class="label">${k.label}</div><div class="value">${k.value}</div><div class="sub">${k.sub ?? ''}</div></div>
    `).join('');
    const tbody = document.getElementById('topContracts');
    tbody.innerHTML = d.topContracts.length
      ? d.topContracts.map(c => `
          <tr><td>${c.contractNumber} · ${c.lead?.companyName ?? '—'}</td>
              <td class="num">${fmtMoney(c.totalValue)}</td>
              <td class="num">${fmtMoney(c.projectedMargin)}</td>
              <td>${fmtDay(c.signedAt)}</td></tr>`).join('')
      : '<tr><td colspan="4" class="empty">sem contratos ativos</td></tr>';
    document.getElementById('summary').textContent = `${d.pipeline.won} ganhos · ${d.pipeline.lost} cancelados`;
  } catch (err) {
    document.getElementById('summary').innerHTML = `<span class="err">${err.message}</span>`;
  }
}

async function loadEntries() {
  const tbody = document.getElementById('entries');
  tbody.innerHTML = '<tr><td colspan="8" class="empty">carregando…</td></tr>';
  try {
    const s = document.getElementById('entryStatus').value;
    const qs = s ? `?status=${s}` : '';
    const { entries } = await api(`/commercial/commission-entries${qs}`);
    if (!entries.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty">sem entries</td></tr>'; return; }
    tbody.innerHTML = entries.map(e => `
      <tr>
        <td>${String(e.contractId).slice(0,8)}…</td>
        <td>${String(e.userId).slice(0,8)}…</td>
        <td>${e.kind ?? '—'}</td>
        <td><span class="badge ${e.status}">${e.status}</span></td>
        <td class="num">${fmtMoney(e.amount)}</td>
        <td>${fmtDay(e.scheduledFor)}</td>
        <td>${fmtDay(e.paidAt)}</td>
        <td>${e.status === 'RELEASED' ? `<button class="secondary" onclick="payEntry('${e.id}')">marcar pago</button>` : ''}</td>
      </tr>
    `).join('');
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="8" class="err">${err.message}</td></tr>`;
  }
}

async function payEntry(id) {
  const payrollId = prompt('Payroll ID (opcional):') || undefined;
  await tryAction(() => api(`/commercial/commission-entries/${id}/pay`, {
    method: 'POST', body: JSON.stringify({ payrollId, note: 'UI' }),
  }), 'Pago');
  loadEntries();
}

async function tick() {
  await tryAction(() => api('/commercial/commission-entries/tick', { method: 'POST' }), 'Locks liberados');
  loadEntries();
}

async function loadPayments() {
  const tbody = document.getElementById('payments');
  tbody.innerHTML = '<tr><td colspan="6" class="empty">carregando…</td></tr>';
  try {
    const { payments } = await api('/commercial/payments');
    if (!payments.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">sem pagamentos</td></tr>'; return; }
    tbody.innerHTML = payments.map(p => `
      <tr>
        <td>${fmtDay(p.paidAt)}</td>
        <td>${String(p.contractId).slice(0,8)}…</td>
        <td class="num">${fmtMoney(p.amount)}</td>
        <td>${p.method}</td>
        <td>${p.externalRef ?? '—'}</td>
        <td><span class="badge ${p.status}">${p.status}</span></td>
      </tr>
    `).join('');
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="6" class="err">${err.message}</td></tr>`;
  }
}

document.getElementById('planForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const contractId = fd.get('contractId');
  const payload = {
    commissionPct:       Number(fd.get('commissionPct')),
    baseType:            fd.get('baseType'),
    signingPct:          Number(fd.get('signingPct')),
    installmentPct:      Number(fd.get('installmentPct')),
    carencyDays:         Number(fd.get('carencyDays')),
    managerOverridePct:  Number(fd.get('managerOverridePct')),
    sdrSplitPct:         Number(fd.get('sdrSplitPct')),
  };
  const ok = await tryAction(() => api(`/commercial/contracts/${contractId}/commission-plan`, {
    method: 'POST', body: JSON.stringify(payload),
  }), 'Plano criado + entries forecast');
  if (ok) { e.target.reset(); loadEntries(); loadDashboard(); }
});

document.getElementById('payForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const payload = {
    contractId:    fd.get('contractId'),
    installmentId: fd.get('installmentId') || undefined,
    amount:        Number(fd.get('amount')),
    paidAt:        new Date(fd.get('paidAt')).toISOString(),
    method:        fd.get('method'),
    externalRef:   fd.get('externalRef') || undefined,
  };
  const ok = await tryAction(() => api('/commercial/payments', {
    method: 'POST', body: JSON.stringify(payload),
  }), 'Pagamento registrado');
  if (ok) { e.target.reset(); loadPayments(); loadEntries(); loadDashboard(); }
});

loadDashboard();
loadEntries();
loadPayments();
</script>
</body>
</html>
