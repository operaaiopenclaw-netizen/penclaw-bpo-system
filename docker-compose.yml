# ============================================================
# Orkestra.AI — production-equivalent local stack
# API (Node/Fastify, built from root Dockerfile) + Postgres 15 + Redis 7.
# For lightweight dev (DB+Redis only, API via `npm run dev`) use:
#   docker-compose -f docker-compose.dev.yml up -d
# ============================================================

services:
  db:
    image: postgres:15-alpine
    container_name: orkestra-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orkestra
    ports:
      - "5433:5432"
    volumes:
      - orkestra-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orkestra"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: orkestra-redis
    ports:
      - "6380:6379"
    volumes:
      - orkestra-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orkestra-api
    ports:
      - "3010:3010"
    environment:
      NODE_ENV: production
      PORT: 3010
      DATABASE_URL: postgresql://postgres:postgres@db:5432/orkestra
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production-please-yes-32}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production-yes-32}
      WEBHOOK_HMAC_SECRET: ${WEBHOOK_HMAC_SECRET:-dev-hmac-change-me}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-a1b2c3d4-e5f6-7890-abcd-ef1234567890}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3010/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # Dev-only DB web UI — enable with: docker compose --profile dev up -d
  adminer:
    image: adminer
    container_name: orkestra-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    profiles:
      - dev
    restart: unless-stopped

volumes:
  orkestra-postgres:
  orkestra-redis:
